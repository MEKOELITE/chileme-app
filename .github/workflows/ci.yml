name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: chileme-app/web-part/package-lock.json

    - name: Install dependencies
      run: |
        cd chileme-app/web-part
        npm ci

    - name: Lint
      run: |
        cd chileme-app/web-part
        npm run lint || true

    - name: Run tests
      run: |
        cd chileme-app/web-part
        npm test -- --run

    - name: Build
      run: |
        cd chileme-app/web-part
        npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: chileme-app/web-part/dist/
